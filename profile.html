<!DOCTYPE html>
<html>
<head>
  <title>Profile — Solite</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&family=Caveat:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
  <script src="firebase-config.js"></script>
  <script>firebase.initializeApp(firebaseConfig);</script>

  <style>
    .profile-wrap { max-width: 680px; margin: 0 auto; padding: 1.5rem; position: relative; z-index: 1; }

    /* Avatar with photo upload */
    .avatar-wrap {
      position: relative; flex-shrink: 0; cursor: pointer;
    }
    .avatar-circle {
      width: 80px; height: 80px; border-radius: 50%;
      background: linear-gradient(135deg, #c8855c, #a05530);
      display: flex; align-items: center; justify-content: center;
      color: white; font-family: 'Caveat', cursive;
      font-size: 2rem; font-weight: 600;
      border: 3px solid #e0c8b0;
      overflow: hidden; object-fit: cover;
    }
    .avatar-circle img {
      width: 100%; height: 100%; object-fit: cover; border-radius: 50%;
    }
    .avatar-edit-badge {
      position: absolute; bottom: 0; right: 0;
      width: 24px; height: 24px; border-radius: 50%;
      background: linear-gradient(135deg, #c8855c, #a05530);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; border: 2px solid white;
      cursor: pointer; color: white;
    }

    .profile-header-row {
      display: flex; align-items: flex-start; gap: 20px;
      flex-wrap: wrap; margin-bottom: 1.2rem;
      background: rgba(255,255,255,0.82);
      border-radius: 20px; padding: 20px;
      border: 1px solid rgba(210,175,140,0.3);
      box-shadow: 0 4px 18px rgba(120,70,30,0.09);
    }

    .profile-name {
      font-family: 'Playfair Display', serif;
      font-style: italic; font-size: 1.5rem; color: #5c3317;
    }

    .bio-display {
      font-family: 'Caveat', cursive;
      font-size: 1rem; color: #b07858; margin-top: 4px;
      min-height: 20px; cursor: pointer;
    }
    .bio-display:empty::after {
      content: 'add a bio...';
      color: #d4b898; font-style: italic;
    }

    .bio-edit-area {
      display: none; margin-top: 6px;
    }
    .bio-textarea {
      width: 100%; padding: 8px 12px; border-radius: 10px;
      border: 1.5px solid #c8855c; font-family: 'Caveat', cursive;
      font-size: 1rem; color: #7a4a2a; background: rgba(255,255,255,0.9);
      resize: none; min-height: 56px; box-sizing: border-box;
    }
    .bio-textarea:focus { outline: none; }

    .stat-box { display: flex; gap: 20px; margin: 10px 0; flex-wrap: wrap; }
    .stat { text-align: center; }
    .stat strong { display: block; font-size: 1.1rem; color: #5c3317; font-weight: 500; }
    .stat span { font-size: 0.75rem; color: #c8a888; }

    .tab-bar { display: flex; gap: 8px; margin: 1.2rem 0; flex-wrap: wrap; }
    .tab {
      background: rgba(255,255,255,0.72); border: 1.5px solid #e0c8b0;
      color: #7a4a2a; padding: 7px 18px; border-radius: 24px;
      cursor: pointer; font-size: 0.85rem; font-family: 'DM Sans', sans-serif;
      transition: 0.2s;
    }
    .tab.active, .tab:hover {
      background: linear-gradient(135deg, #c8855c, #a05530);
      color: white; border-color: #c8855c;
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .post-tab-card {
      background: rgba(255,255,255,0.88); border-radius: 16px;
      padding: 14px; margin-bottom: 14px;
      box-shadow: 0 4px 14px rgba(120,70,30,0.08);
      border: 1px solid rgba(210,175,140,0.25);
    }

    .action-btn {
      padding: 8px 20px; border-radius: 24px;
      font-size: 0.88rem; cursor: pointer; transition: 0.2s;
      font-family: 'DM Sans', sans-serif;
    }
    .action-btn.primary {
      background: linear-gradient(135deg, #c8855c, #a05530);
      color: white; border: none;
    }
    .action-btn.secondary {
      background: rgba(255,255,255,0.8); color: #7a4a2a;
      border: 1.5px solid #e0c8b0;
    }
    .action-btn.friend {
      background: #fdf0e6; color: #7a4a2a;
      border: 1.5px solid #e0c8b0;
    }
    .action-btn.danger {
      background: rgba(255,255,255,0.8); color: #c07060;
      border: 1.5px solid #f0c8b8;
      font-size: 0.8rem; padding: 6px 14px;
    }
    .action-btn.danger:hover { background: #fff0ec; border-color: #c07060; }

    .safety-row {
      display: flex; gap: 8px; flex-wrap: wrap;
      margin-top: 10px; padding-top: 10px;
      border-top: 1px solid #f5ede0;
    }

    /* Quick yap box */
    .quick-yap {
      background: linear-gradient(135deg, #e8c8a8, #d4a878, #e0b890);
      background-size: 300% 300%;
      animation: gradientMove 8s ease infinite;
      border-radius: 18px; padding: 16px;
      margin-bottom: 1.2rem;
      border: 1px solid rgba(180,120,70,0.3);
    }
    @keyframes gradientMove {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .quick-yap textarea {
      width: 100%; padding: 10px 14px; border-radius: 12px;
      border: none; background: rgba(255,255,255,0.75);
      font-family: 'DM Sans', sans-serif; color: #3d2010;
      font-size: 0.9rem; resize: none; min-height: 70px;
      box-sizing: border-box; margin-bottom: 8px;
    }
    .quick-yap textarea:focus { outline: none; background: rgba(255,255,255,0.92); }

    .friends-list { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; }
    .friend-chip {
      display: flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.85); border-radius: 24px;
      padding: 6px 14px; border: 1px solid #f0dfd0;
      text-decoration: none; transition: 0.2s;
    }
    .friend-chip:hover { background: #fdf0e6; border-color: #e0c8b0; }
    .friend-chip-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: linear-gradient(135deg, #c8855c, #a05530);
      display: flex; align-items: center; justify-content: center;
      color: white; font-family: 'Caveat', cursive; font-size: 0.9rem;
      overflow: hidden;
    }
    .friend-chip-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .friend-chip-name { font-family: 'Caveat', cursive; font-size: 1rem; color: #5c3317; }

    .empty-msg {
      text-align: center; font-family: 'Caveat', cursive;
      color: #b07858; font-size: 1.1rem; padding: 24px;
    }

    .safety-overlay {
      position: fixed; inset: 0;
      background: rgba(60,20,5,0.55);
      display: flex; align-items: center; justify-content: center;
      z-index: 99999; backdrop-filter: blur(6px);
    }
    .safety-box {
      background: #fdf5ec; border-radius: 24px; padding: 28px;
      max-width: 340px; width: 90%; text-align: center;
      border: 1px solid #e0c8b0;
      box-shadow: 0 20px 60px rgba(100,50,10,0.2);
    }
    .safety-box h3 {
      font-family: 'Playfair Display', serif; font-style: italic;
      color: #5c3317; font-size: 1.2rem; margin-bottom: 8px;
    }
    .safety-box p {
      font-family: 'Caveat', cursive; color: #b07858;
      font-size: 1rem; margin-bottom: 20px; line-height: 1.5;
    }
    .safety-box-btns { display: flex; gap: 10px; }
  </style>
</head>

<body>
<div id="daisy-bg"></div>

<header class="top">
  <h1>🌸 Profile</h1>
  <p>"your little corner of solite"</p>
  <nav style="margin-top:10px;">
    <a href="index.html" style="color:#5c3317;text-decoration:none;font-size:0.9rem;font-family:'DM Sans',sans-serif;">← back home</a>
  </nav>
</header>

<div class="profile-wrap">

  <!-- PROFILE HEADER -->
  <div class="profile-header-row">
    <div class="avatar-wrap" id="avatarWrap">
      <div class="avatar-circle" id="avatarCircle">?</div>
      <!-- edit badge shown on own profile only -->
      <div class="avatar-edit-badge" id="avatarEditBadge" style="display:none;" onclick="triggerPhotoUpload()">✏️</div>
      <input type="file" id="photoInput" accept="image/*" style="display:none;" onchange="uploadPhoto(this)">
    </div>
    <div style="flex:1;">
      <div class="profile-name" id="displayName">loading...</div>

      <!-- Bio — click to edit on own profile -->
      <div class="bio-display" id="bioDisplay" onclick="startBioEdit()"></div>
      <div class="bio-edit-area" id="bioEditArea">
        <textarea class="bio-textarea" id="bioInput" placeholder="a little something about you..." rows="2"></textarea>
        <div style="display:flex;gap:8px;margin-top:6px;">
          <button onclick="saveBio()" style="padding:6px 16px;font-size:0.82rem;">save ✨</button>
          <button onclick="cancelBioEdit()" style="padding:6px 16px;font-size:0.82rem;background:rgba(255,255,255,0.8);color:#7a4a2a;border:1.5px solid #e0c8b0;">cancel</button>
        </div>
      </div>

      <div class="stat-box" id="statBox"></div>
      <div id="actionBtns" style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;"></div>
      <div id="safetyRow" class="safety-row" style="display:none;"></div>
    </div>
  </div>

  <!-- QUICK YAP (own profile only) -->
  <div class="quick-yap" id="quickYap" style="display:none;">
    <div style="font-family:'Playfair Display',serif;font-style:italic;font-size:1rem;color:#5c3317;margin-bottom:8px;">yap something 🌙</div>
    <textarea id="yapInput" placeholder="what's on your mind..."></textarea>
    <div style="display:flex;gap:8px;align-items:center;">
      <select id="yapType" style="padding:8px 12px;border-radius:12px;border:none;background:rgba(255,255,255,0.75);font-family:'DM Sans',sans-serif;color:#3d2010;font-size:0.85rem;flex:1;">
        <option value="💬 Yap">💬 Yap</option>
        <option value="🎧 Song">🎧 Song</option>
        <option value="📖 Book">📖 Book</option>
        <option value="☕ Café">☕ Café</option>
      </select>
      <button onclick="quickYap()" style="padding:8px 20px;font-size:0.88rem;">Yap! ✨</button>
    </div>
  </div>

  <!-- TABS -->
  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('posts')">posts</button>
    <button class="tab" onclick="switchTab('music')">music</button>
    <button class="tab" onclick="switchTab('stories')">stories</button>
    <button class="tab" onclick="switchTab('cafes')">cafés</button>
    <button class="tab" onclick="switchTab('friends')">friends</button>
  </div>

  <div id="tab-posts"   class="tab-panel active"><div id="postsList"></div></div>
  <div id="tab-music"   class="tab-panel"><div id="musicList"></div></div>
  <div id="tab-stories" class="tab-panel"><div id="storiesList"></div></div>
  <div id="tab-cafes"   class="tab-panel"><div id="cafesList"></div></div>
  <div id="tab-friends" class="tab-panel"><div id="friendsList"></div></div>

</div>

<script>
const db      = firebase.firestore();
const storage = firebase.storage();
let currentUser  = null;
let profileUid   = null;
let isOwnProfile = false;

firebase.auth().onAuthStateChanged(async user => {
  if (!user) { window.location.href = 'login.html'; return; }
  currentUser = user;
  const params = new URLSearchParams(window.location.search);
  profileUid   = params.get('uid') || user.uid;
  isOwnProfile = user.uid === profileUid;
  await loadProfile();
  loadTab('posts');
});

async function loadProfile() {
  const doc  = await db.collection('users').doc(profileUid).get();
  const data = doc.exists ? doc.data() : {};

  const username = data.username || 'solite member';
  const bio      = data.bio      || '';
  const photoUrl = data.photoUrl || null;

  // avatar
  const avatarEl = document.getElementById('avatarCircle');
  if (photoUrl) {
    avatarEl.innerHTML = `<img src="${photoUrl}" alt="${username}">`;
  } else {
    avatarEl.textContent = username.charAt(0).toUpperCase();
  }

  document.getElementById('displayName').textContent = '@' + username;
  document.getElementById('bioDisplay').textContent  = bio;

  if (isOwnProfile) {
    document.getElementById('avatarEditBadge').style.display = 'flex';
    document.getElementById('quickYap').style.display        = 'block';
    document.getElementById('bioInput').value                = bio;
    // make bio clickable hint
    const bioEl = document.getElementById('bioDisplay');
    bioEl.title = 'click to edit';
    bioEl.style.cursor = 'pointer';
  } else {
    document.getElementById('bioDisplay').style.cursor = 'default';
    document.getElementById('bioDisplay').onclick      = null;
  }

  const [postsSnap, friendsSnap] = await Promise.all([
    db.collection('posts').where('uid', '==', profileUid).get(),
    db.collection('users').doc(profileUid).collection('friends').get()
  ]);

  document.getElementById('statBox').innerHTML = `
    <div class="stat"><strong>${postsSnap.size}</strong><span>posts</span></div>
    <div class="stat"><strong>${friendsSnap.size}</strong><span>friends</span></div>
  `;

  const btns = document.getElementById('actionBtns');
  btns.innerHTML = '';

  if (isOwnProfile) {
    const msgBtn = document.createElement('button');
    msgBtn.textContent = '💌 messages';
    msgBtn.className   = 'action-btn secondary';
    msgBtn.onclick     = () => window.location.href = 'messages.html';
    btns.appendChild(msgBtn);
  } else {
    const [isFriendDoc, isBlockedDoc, isMutedDoc] = await Promise.all([
      db.collection('users').doc(currentUser.uid).collection('friends').doc(profileUid).get(),
      db.collection('users').doc(currentUser.uid).collection('blocked').doc(profileUid).get(),
      db.collection('users').doc(currentUser.uid).collection('muted').doc(profileUid).get()
    ]);

    const isFriend  = isFriendDoc.exists;
    const isBlocked = isBlockedDoc.exists;
    const isMuted   = isMutedDoc.exists;

    if (!isBlocked) {
      if (isFriend) {
        const msgBtn = document.createElement('button');
        msgBtn.textContent = '💌 send a note';
        msgBtn.className   = 'action-btn primary';
        msgBtn.onclick     = () => window.location.href = `messages.html?uid=${profileUid}`;
        btns.appendChild(msgBtn);
        const friendBadge = document.createElement('span');
        friendBadge.textContent = 'friends ✓';
        friendBadge.className   = 'action-btn friend';
        btns.appendChild(friendBadge);
      } else {
        const addBtn = document.createElement('button');
        addBtn.textContent = '🤍 add friend';
        addBtn.className   = 'action-btn primary';
        addBtn.onclick     = () => addFriendFromProfile(profileUid);
        btns.appendChild(addBtn);
      }
    }

    const safetyRow = document.getElementById('safetyRow');
    safetyRow.style.display = 'flex';
    safetyRow.innerHTML = '';

    const muteBtn = document.createElement('button');
    muteBtn.textContent = isMuted ? '🔇 muted' : '🔇 mute';
    muteBtn.className   = 'action-btn danger';
    muteBtn.onclick     = () => toggleMute(profileUid, isMuted, username);
    safetyRow.appendChild(muteBtn);

    const blockBtn = document.createElement('button');
    blockBtn.textContent = isBlocked ? '🚫 unblock' : '🚫 block';
    blockBtn.className   = 'action-btn danger';
    blockBtn.onclick     = () => toggleBlock(profileUid, isBlocked, username);
    safetyRow.appendChild(blockBtn);

    const reportBtn = document.createElement('button');
    reportBtn.textContent = '⚑ report';
    reportBtn.className   = 'action-btn danger';
    reportBtn.onclick     = () => showReportOverlay(profileUid, username);
    safetyRow.appendChild(reportBtn);
  }
}

// ==========================
// PHOTO UPLOAD
// ==========================
function triggerPhotoUpload() {
  document.getElementById('photoInput').click();
}

async function uploadPhoto(input) {
  const file = input.files[0];
  if (!file) return;

  const avatarEl = document.getElementById('avatarCircle');
  avatarEl.innerHTML = `<span style="font-size:0.7rem;color:white;">uploading...</span>`;

  try {
    const ref = storage.ref().child(`avatars/${currentUser.uid}`);
    await ref.put(file);
    const url = await ref.getDownloadURL();
    await db.collection('users').doc(currentUser.uid).set({ photoUrl: url }, { merge: true });
    avatarEl.innerHTML = `<img src="${url}" alt="profile photo">`;
    showToast('photo updated 🌼');
  } catch(err) {
    console.error('Photo upload error:', err);
    showToast('upload failed 🌸 try again');
    await loadProfile();
  }
}

// ==========================
// BIO EDITING
// ==========================
function startBioEdit() {
  if (!isOwnProfile) return;
  document.getElementById('bioDisplay').style.display  = 'none';
  document.getElementById('bioEditArea').style.display = 'block';
  document.getElementById('bioInput').focus();
}

function cancelBioEdit() {
  document.getElementById('bioDisplay').style.display  = '';
  document.getElementById('bioEditArea').style.display = 'none';
}

async function saveBio() {
  const bio = document.getElementById('bioInput').value.trim();
  await db.collection('users').doc(currentUser.uid).set({ bio }, { merge: true });
  document.getElementById('bioDisplay').textContent    = bio;
  document.getElementById('bioDisplay').style.display  = '';
  document.getElementById('bioEditArea').style.display = 'none';
  showToast('bio updated 🌼');
}

// ==========================
// QUICK YAP
// ==========================
async function quickYap() {
  const text = document.getElementById('yapInput').value.trim();
  const type = document.getElementById('yapType').value;
  if (!text) { showToast('write something first 🌸'); return; }

  const userDoc  = await db.collection('users').doc(currentUser.uid).get();
  const username = userDoc.exists ? (userDoc.data().username || 'anonymous') : 'anonymous';

  await db.collection('posts').add({
    text, type, extra: '', lyrics: '', imageUrl: '',
    uid: currentUser.uid, username,
    likes: [],
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  });

  document.getElementById('yapInput').value = '';
  showToast('yapped! 🌸');
  loadTab('posts'); // refresh posts tab
}

// ==========================
// MUTE / BLOCK / REPORT
// ==========================
async function toggleMute(targetUid, isMuted, username) {
  if (isMuted) {
    await db.collection('users').doc(currentUser.uid).collection('muted').doc(targetUid).delete();
    showToast(`@${username} unmuted 🌸`);
  } else {
    showSafetyConfirm(`mute @${username}?`, `you won't see their posts in your feed. they won't know.`, async () => {
      await db.collection('users').doc(currentUser.uid).collection('muted').doc(targetUid).set({ uid: targetUid, mutedAt: firebase.firestore.FieldValue.serverTimestamp() });
      showToast(`@${username} muted 🌸`);
      await loadProfile();
    });
    return;
  }
  await loadProfile();
}

async function toggleBlock(targetUid, isBlocked, username) {
  if (isBlocked) {
    await db.collection('users').doc(currentUser.uid).collection('blocked').doc(targetUid).delete();
    showToast(`@${username} unblocked 🌸`);
    await loadProfile();
  } else {
    showSafetyConfirm(`block @${username}?`, `their posts will appear greyed out. they can't message you.`, async () => {
      await db.collection('users').doc(currentUser.uid).collection('blocked').doc(targetUid).set({ uid: targetUid, blockedAt: firebase.firestore.FieldValue.serverTimestamp() });
      await Promise.all([
        db.collection('users').doc(currentUser.uid).collection('friends').doc(targetUid).delete(),
        db.collection('users').doc(targetUid).collection('friends').doc(currentUser.uid).delete()
      ]);
      showToast(`@${username} blocked 🌸`);
      await loadProfile();
    });
  }
}

function showReportOverlay(targetUid, username) {
  if (document.getElementById('reportOverlay')) return;
  const overlay = document.createElement('div');
  overlay.id = 'reportOverlay';
  overlay.className = 'safety-overlay';
  overlay.innerHTML = `
    <div class="safety-box">
      <h3>report @${username}</h3>
      <p>what's the reason?</p>
      <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:18px;text-align:left;">
        ${['spam or fake account','harassment or bullying','inappropriate content','something else'].map(r => `
          <label style="display:flex;align-items:center;gap:10px;font-family:'DM Sans',sans-serif;font-size:0.88rem;color:#7a4a2a;cursor:pointer;">
            <input type="radio" name="reportReason" value="${r}" style="accent-color:#c8855c;width:auto;margin:0;">${r}
          </label>`).join('')}
      </div>
      <div class="safety-box-btns">
        <button onclick="submitReport('${targetUid}','${username}')" style="flex:1;padding:10px;">send report</button>
        <button onclick="document.getElementById('reportOverlay').remove()" style="flex:1;padding:10px;background:rgba(255,255,255,0.8);color:#7a4a2a;border:1.5px solid #e0c8b0;">cancel</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

async function submitReport(targetUid, username) {
  const reason = document.querySelector('input[name="reportReason"]:checked')?.value;
  if (!reason) { showToast('please select a reason 🌸'); return; }
  await db.collection('reports').add({ reportedUid: targetUid, reportedUsername: username, reporterUid: currentUser.uid, reason, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
  document.getElementById('reportOverlay')?.remove();
  showToast('report sent 🌸 thank you for keeping solite safe');
}

function showSafetyConfirm(title, message, onConfirm) {
  if (document.getElementById('safetyConfirmOverlay')) return;
  const overlay = document.createElement('div');
  overlay.id = 'safetyConfirmOverlay';
  overlay.className = 'safety-overlay';
  overlay.innerHTML = `
    <div class="safety-box">
      <h3>${title}</h3><p>${message}</p>
      <div class="safety-box-btns">
        <button id="safetyConfirmBtn" style="flex:1;padding:10px;">yes, confirm</button>
        <button onclick="document.getElementById('safetyConfirmOverlay').remove()" style="flex:1;padding:10px;background:rgba(255,255,255,0.8);color:#7a4a2a;border:1.5px solid #e0c8b0;">cancel</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  document.getElementById('safetyConfirmBtn').onclick = async () => { overlay.remove(); await onConfirm(); };
}

async function addFriendFromProfile(targetUid) {
  const myDoc         = await db.collection('users').doc(currentUser.uid).get();
  const myUsername    = myDoc.exists ? (myDoc.data().username || 'someone') : 'someone';
  const theirDoc      = await db.collection('users').doc(targetUid).get();
  const theirUsername = theirDoc.exists ? (theirDoc.data().username || 'someone') : 'someone';
  await Promise.all([
    db.collection('users').doc(currentUser.uid).collection('friends').doc(targetUid).set({ uid: targetUid, username: theirUsername, addedAt: firebase.firestore.FieldValue.serverTimestamp() }),
    db.collection('users').doc(targetUid).collection('friends').doc(currentUser.uid).set({ uid: currentUser.uid, username: myUsername, addedAt: firebase.firestore.FieldValue.serverTimestamp() }),
    db.collection('users').doc(currentUser.uid).collection('following').doc(targetUid).set({ uid: targetUid }),
    db.collection('users').doc(targetUid).collection('following').doc(currentUser.uid).set({ uid: currentUser.uid }),
    db.collection('users').doc(targetUid).collection('notifications').add({ text: `@${myUsername} added you as a friend 🌼`, createdAt: firebase.firestore.FieldValue.serverTimestamp() })
  ]);
  showToast(`you and @${theirUsername} are now friends 🌼`);
  await loadProfile();
}

function showToast(msg) {
  const toast = document.createElement('div');
  toast.style.cssText = `position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#fdf5ec;border:1px solid #e0c8b0;border-radius:24px;padding:10px 24px;font-family:'Caveat',cursive;font-size:1.1rem;color:#5c3317;box-shadow:0 6px 20px rgba(100,50,10,0.15);z-index:99999;white-space:nowrap;`;
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['posts','music','stories','cafes','friends'][i] === tab);
  });
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  loadTab(tab);
}

function loadTab(tab) {
  if (tab === 'friends') { loadFriendsTab(); return; }
  const listIds = { posts: 'postsList', music: 'musicList', stories: 'storiesList', cafes: 'cafesList' };
  const list    = document.getElementById(listIds[tab]);
  list.innerHTML = `<p style="color:#c8a888;font-size:0.88rem;text-align:center;padding:10px;">loading...</p>`;
  db.collection(tab).where('uid', '==', profileUid).orderBy('createdAt', 'desc').get()
    .then(snap => {
      list.innerHTML = '';
      if (snap.empty) { list.innerHTML = `<div class="empty-msg">nothing here yet 🌸</div>`; return; }
      snap.forEach(doc => {
        const d = doc.data();
        const card = document.createElement('div');
        card.className = 'post-tab-card';
        if (tab === 'posts') {
          card.innerHTML = `
            <p style="color:#3d2010;font-size:0.92rem;line-height:1.6;">${d.text || ''}</p>
            <p style="font-size:0.75rem;color:#c8a888;margin-top:6px;font-family:'DM Sans',sans-serif;">${d.type || ''}</p>`;
        } else if (tab === 'music') {
          card.innerHTML = `
            <h3 style="font-family:'Playfair Display',serif;color:#5c3317;font-size:1rem;">${d.title || ''}</h3>
            ${d.feelings ? `<p style="font-size:0.85rem;color:#b07858;font-family:'Caveat',cursive;">"${d.feelings}"</p>` : ''}`;
        } else if (tab === 'stories') {
          const preview = d.body ? d.body.slice(0,120) + (d.body.length > 120 ? '...' : '') : '';
          card.innerHTML = `
            <h3 style="font-family:'Playfair Display',serif;color:#5c3317;font-size:1rem;">${d.title || ''}</h3>
            <p style="font-size:0.85rem;color:#9a7060;margin-top:4px;line-height:1.5;">${preview}</p>`;
        } else if (tab === 'cafes') {
          const stars = '★'.repeat(d.rating||0) + '☆'.repeat(5-(d.rating||0));
          card.innerHTML = `
            <h3 style="font-family:'Playfair Display',serif;color:#5c3317;font-size:1rem;">${d.name || ''}</h3>
            ${d.city ? `<p style="font-size:0.78rem;color:#c8a888;margin-top:2px;">📍 ${d.city}</p>` : ''}
            <div style="color:#f5d76e;font-size:0.9rem;margin-top:4px;">${stars}</div>`;
        }
        list.appendChild(card);
      });
    }).catch(() => { list.innerHTML = `<div class="empty-msg">nothing here yet 🌸</div>`; });
}

async function loadFriendsTab() {
  const list = document.getElementById('friendsList');
  list.innerHTML = `<p style="color:#c8a888;font-size:0.88rem;text-align:center;padding:10px;">loading...</p>`;
  const snap = await db.collection('users').doc(profileUid).collection('friends').get();
  if (snap.empty) {
    list.innerHTML = `<div class="empty-msg">no friends yet 🌸<br><span style="font-size:0.9rem;">use the + button to find someone</span></div>`;
    return;
  }
  const container = document.createElement('div');
  container.className = 'friends-list';
  for (const doc of snap.docs) {
    const data     = doc.data();
    const username = data.username || 'solite member';
    const link     = document.createElement('a');
    link.href      = `profile.html?uid=${doc.id}`;
    link.className = 'friend-chip';
    // load their photo if available
    const userDoc = await db.collection('users').doc(doc.id).get();
    const photo   = userDoc.exists ? userDoc.data().photoUrl : null;
    link.innerHTML = `
      <div class="friend-chip-avatar">
        ${photo ? `<img src="${photo}" alt="${username}">` : username.charAt(0).toUpperCase()}
      </div>
      <span class="friend-chip-name">@${username}</span>`;
    container.appendChild(link);
  }
  list.innerHTML = '';
  list.appendChild(container);
}
</script>

<script>
(function() {
  const container = document.getElementById('daisy-bg');
  function makeDaisy(size) {
    const ns = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(ns, 'svg');
    svg.setAttribute('width', size*2.6); svg.setAttribute('height', size*2.6); svg.setAttribute('viewBox', '-20 -20 40 40');
    [0,45,90,135,180,225,270,315].forEach(a => {
      const el = document.createElementNS(ns, 'ellipse');
      el.setAttribute('cx',0); el.setAttribute('cy',-size); el.setAttribute('rx',size*0.44); el.setAttribute('ry',size*0.77);
      el.setAttribute('fill','#fffef0'); el.setAttribute('transform',`rotate(${a})`); svg.appendChild(el);
    });
    const c1 = document.createElementNS(ns,'circle'); c1.setAttribute('r',size*0.55); c1.setAttribute('fill','#f5d76e'); svg.appendChild(c1);
    const c2 = document.createElementNS(ns,'circle'); c2.setAttribute('r',size*0.28); c2.setAttribute('fill','#e8c94a'); svg.appendChild(c2);
    return svg;
  }
  for (let i = 0; i < 24; i++) {
    const w = document.createElement('div'); w.classList.add('daisy');
    const size = 5+Math.random()*7;
    const opHigh = (0.25+Math.random()*0.35).toFixed(2);
    const opLow  = (parseFloat(opHigh)*0.3).toFixed(2);
    w.style.cssText = `left:${(Math.random()*100).toFixed(1)}%;top:${(Math.random()*100).toFixed(1)}%;--op-high:${opHigh};--op-low:${opLow};animation-duration:${(3+Math.random()*5).toFixed(1)}s;animation-delay:-${(Math.random()*6).toFixed(1)}s;`;
    const svg = makeDaisy(size);
    svg.style.animationDuration = `${(2+Math.random()*4).toFixed(1)}s`;
    svg.style.animationDelay    = `-${(Math.random()*6).toFixed(1)}s`;
    w.appendChild(svg); container.appendChild(w);
  }
})();
</script>
