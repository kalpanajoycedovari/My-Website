  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="firebase-config.js"></script>
  <script>firebase.initializeApp(firebaseConfig);</script>
  <style>

</head>
<body>
  <h2>🌼 Solite Card Seeder</h2>

<script>

    lyrics: '',

  },
  {

  }
];

async function seedCards() {
  const log = document.getElementById('log');
  log.innerHTML = 'starting... 🌼<br>';

  for (const card of cards) {
    await db.collection('posts').add({
      text:      card.text,
      type:      card.type,
      extra:     card.extra,
      lyrics:    card.lyrics,
      imageUrl:  '',
      uid:       UID,
      username:  USERNAME,
      likes:     [],
      category:  card.category,
      isSeeded:  true,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    log.innerHTML += `✅ added: ${card.extra}<br>`;
    await new Promise(r => setTimeout(r, 300));
  }

  log.innerHTML += '<br>🌸 all done! now remove the static cards from index.html and delete this file from your repo.';
}
</script>
</body>
</html>
