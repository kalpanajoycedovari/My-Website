<!DOCTYPE html>
<html>
<head>
  <title>Playlist</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&family=Caveat:wght@400;600&display=swap" rel="stylesheet">
   <link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" href="favicon.png">
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <script src="firebase-config.js"></script>

  <script>
    firebase.initializeApp(firebaseConfig);
  </script>

</head>

<body>

<h1 style="text-align:center;">Your Playlist</h1>
<div id="playlistContainer" class="masonry"></div>

<script>
const db = firebase.firestore();

firebase.auth().onAuthStateChanged(user => {
  if (!user) {
    window.location.href = "login.html";
    return;
  }

  const container = document.getElementById("playlistContainer");

  db.collection("users")
    .doc(user.uid)
    .collection("saved")
    .get()
    .then(snapshot => {
      snapshot.forEach(doc => {
        const data = doc.data();

        if (data.title.includes("Song") || data.title.includes("Playlist")) {
          container.innerHTML += `
            <div class="card">
              <h3>${data.title}</h3>
              <p>${data.text}</p>
            </div>
          `;
        }
      });
    });
});
</script>

</body>
</html>
