<!DOCTYPE html>
<html>
<head>
  <title>Your Playlist</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1 style="text-align:center;">🎵 Your Playlist</h1>

<div id="playlistContainer" class="masonry"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDc8vbutr2Sfnb49D58LYDdcxAqdY3sNWo",
  authDomain: "solite-d9bdb.firebaseapp.com",
  projectId: "solite-d9bdb"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

firebase.auth().onAuthStateChanged(user => {

  const container = document.getElementById("playlistContainer");

  db.collection("users")
    .doc(user.uid)
    .collection("saved")
    .get()
    .then(snapshot => {

      snapshot.forEach(doc => {
        const data = doc.data();

        if (data.title.includes("Song") || data.title.includes("Playlist")) {

          container.innerHTML += `
            <div class="card">
              <h3>${data.title}</h3>
              <p>${data.text}</p>
            </div>
          `;
        }

      });

    });

});
</script>

</body>
</html>
