<!DOCTYPE html>
<html>
<head>
  <title>Solite's Corner</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins&family=Playfair+Display&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="style.css">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#8fbf9f">

  <!-- Mobile -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- iPhone -->
  <link rel="apple-touch-icon" href="images/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
</head>

<body>

<header class="top">
  <h1>Solite's Corner</h1>

  <!-- MENU -->
  <div class="dropdown">
    <button class="dropbtn">☰ Menu</button>

    <div class="dropdown-content">

      <div class="menu-profile" id="menuProfile">
        <img src="https://via.placeholder.com/40">
        <span>Loading...</span>
      </div>

      <a href="index.html">Home</a>
      <a href="#">Music</a>
      <a href="#">Stories</a>
      <a href="#">Cafés</a>

      <button class="menu-btn" onclick="toggleDarkMode()">🌙 Dark Mode</button>
      <button class="menu-btn logout" onclick="logout()">🚪 Logout</button>

    </div>
  </div>
</header>

<main class="masonry">

  <!-- ✍️ CREATE POST -->
  <div class="create-post">
    <textarea id="postInput" placeholder="yap about your day... 🌙"></textarea>

    <select id="postType">
      <option value="💬 Yap">💬 Yap</option>
      <option value="🎧 Song">🎧 Song</option>
      <option value="📖 Book">📖 Book</option>
      <option value="☕ Café">☕ Café</option>
    </select>

    <input type="text" id="extraInput" placeholder="extra (song link, book name...)">

    <button onclick="createPost()">Post ✨</button>
  </div>

  <!-- POSTS -->
  <div id="postsContainer"></div>

</main>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_REAL_API_KEY",
  authDomain: "solite-d9bdb.firebaseapp.com",
  projectId: "solite-d9bdb",
};

firebase.initializeApp(firebaseConfig);
</script>

<script src="script.js"></script>

</body>
</html>
