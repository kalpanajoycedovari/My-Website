<!DOCTYPE html>
<html>

<head>
  <title>Solite's Corner</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&family=Caveat:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" href="favicon.png">
  <meta name="theme-color" content="#f7efe6">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="apple-touch-icon" href="images/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
  <script src="firebase-config.js"></script>
  <script>firebase.initializeApp(firebaseConfig);</script>
</head>

<body>
<div id="daisy-bg"></div>

<header class="top">

  <div class="header-top-row">
    <div class="header-left">
      <button class="menu-icon-btn" onclick="toggleMenuPanel()">☰</button>
    </div>

    <div class="header-center">
      <h1>Solite's Corner</h1>
      <p>"A small corner for you and just you!"</p>
      <div class="top-divider">
        <div class="top-divider-line"></div>
        <div class="top-divider-dot"></div>
        <div class="top-divider-dot"></div>
        <div class="top-divider-dot"></div>
        <div class="top-divider-line"></div>
      </div>
    </div>

    <div class="header-right">
      <div id="profileBox"></div>
    </div>
  </div>

  <!-- MENU PANEL -->
  <div id="menuPanel" style="display:none;position:absolute;top:70px;left:16px;background:rgba(255,252,248,0.98);border-radius:16px;box-shadow:0 10px 30px rgba(120,70,30,0.15);border:1px solid rgba(210,175,140,0.4);width:220px;overflow:hidden;z-index:99999;">
    <div style="padding:5px 0;border-bottom:1px solid #f5ede0;">
      <div style="padding:6px 16px 4px;font-size:10px;color:#c8a888;font-family:'DM Sans',sans-serif;text-transform:uppercase;letter-spacing:0.06em;">moods</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;padding:4px 16px 10px;">
        <button onclick="quickFilter('all')"       class="mood-chip active">all</button>
        <button onclick="quickFilter('gloomy')"    class="mood-chip">🌙 gloomy</button>
        <button onclick="quickFilter('soft')"      class="mood-chip">☕ soft</button>
        <button onclick="quickFilter('nostalgic')" class="mood-chip">📷 nostalgic</button>
      </div>
    </div>
    <div style="padding:5px 0;border-bottom:1px solid #f5ede0;">
      <div style="padding:6px 16px 2px;font-size:10px;color:#c8a888;font-family:'DM Sans',sans-serif;text-transform:uppercase;letter-spacing:0.06em;">account</div>
      <div onclick="showEditUsername();toggleMenuPanel();" style="padding:9px 16px;font-size:13px;color:#7a4a2a;font-family:'DM Sans',sans-serif;cursor:pointer;display:flex;align-items:center;gap:8px;">✏️ change username</div>
      <div onclick="showInviteLink();toggleMenuPanel();" style="padding:9px 16px;font-size:13px;color:#7a4a2a;font-family:'DM Sans',sans-serif;cursor:pointer;display:flex;align-items:center;gap:8px;">🌼 invite someone</div>
      <a href="messages.html"      style="padding:9px 16px;font-size:13px;color:#7a4a2a;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:8px;text-decoration:none;">💌 messages</a>
      <a href="notifications.html" style="padding:9px 16px;font-size:13px;color:#7a4a2a;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:8px;text-decoration:none;">🔔 notifications</a>
      <div onclick="toggleDarkMode();" style="padding:9px 16px;font-size:13px;color:#7a4a2a;font-family:'DM Sans',sans-serif;cursor:pointer;display:flex;align-items:center;gap:8px;">🌙 dark mode</div>
    </div>
    <div style="padding:5px 0;">
      <div onclick="logout()" style="padding:9px 16px;font-size:13px;color:#c07060;font-family:'DM Sans',sans-serif;cursor:pointer;display:flex;align-items:center;gap:8px;">🚪 logout</div>
    </div>
  </div>

  <!-- SEARCH + RANDOM -->
  <div class="top-bar">
    <div class="search-oval">
      <div class="search-left-icon">🌼</div>
      <input type="text" id="searchInput" placeholder="what are you looking for...">
      <span class="search-right-deco">✦ ✿</span>
    </div>
    <button id="randomBtn">✦for you</button>
  </div>

  <!-- SEARCH TAGS -->
  <div class="search-tags">
    <span class="stag" onclick="quickSearch('gloomy')">🌙 gloomy</span>
    <span class="stag" onclick="quickSearch('soft')">☕ soft</span>
    <span class="stag" onclick="quickSearch('nostalgic')">📷 nostalgic</span>
  </div>

  <!-- PAGE LINKS -->
  <div class="page-links">
    <a href="music.html" class="page-link">🎧 music</a>
    <a href="stories.html" class="page-link">📖 stories</a>
    <a href="cafes.html" class="page-link">☕ cafés</a>
    <a href="saved.html" class="page-link">❤️ saved</a>
    <button onclick="showAddFriend()" class="page-link find-link">🤍 find friend</button>
  </div>

</header>

<main class="masonry">

  <!-- YAP BOX -->
  <div class="create-post">
    <div style="font-family:'Playfair Display',serif;font-style:italic;font-size:1.1rem;color:#5c3317;margin-bottom:8px;">yap something 🌙</div>
    <textarea id="postInput" placeholder="what's on your mind..."></textarea>
    <select id="postType" style="margin-top:8px;">
      <option value="💬 Yap">💬 Yap</option>
      <option value="🎧 Song">🎧 Song</option>
      <option value="📖 Book">📖 Book</option>
      <option value="☕ Café">☕ Café</option>
    </select>
    <input type="text" id="extraInput" placeholder="song title, book name, café... (optional)">
    <input type="text" id="lyricsInput" placeholder="how does it make you feel...">
    <input type="file" id="imageInput" accept="image/*">
    <button onclick="createPost()" style="margin-top:10px;width:100%;padding:12px;font-size:1rem;">Yap! ✨</button>
    <div id="yapError" style="display:none;font-family:'Caveat',cursive;color:#c8855c;font-size:0.95rem;margin-top:6px;text-align:center;"></div>
  </div>

  <!-- FEED TABS -->
  <div class="feed-tabs">
    <button class="feed-tab active" id="tabEveryone" onclick="switchFeed('everyone')">✦ everyone</button>
    <button class="feed-tab" id="tabFollowing" onclick="switchFeed('following')">🌼 following</button>
  </div>

  <!-- DYNAMIC POSTS FEED -->
  <div id="postsContainer"></div>
</main>

<div id="musicPlayer" style="display:none;">
  <img id="playerImg" src="">
  <div><p id="playerTitle">No song playing</p></div>
</div>

<script src="script.js?v=4"></script>

<script>
(function() {
  const container = document.getElementById('daisy-bg');
  const count = 36;
  function makeDaisy(size) {
    const ns = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(ns, 'svg');
    svg.setAttribute('width', size * 2.6);
    svg.setAttribute('height', size * 2.6);
    svg.setAttribute('viewBox', '-20 -20 40 40');
    [0,45,90,135,180,225,270,315].forEach(a => {
      const el = document.createElementNS(ns, 'ellipse');
      el.setAttribute('cx', 0); el.setAttribute('cy', -size);
      el.setAttribute('rx', size * 0.44); el.setAttribute('ry', size * 0.77);
      el.setAttribute('fill', '#fffef0');
      el.setAttribute('transform', `rotate(${a})`);
      svg.appendChild(el);
    });
    const c1 = document.createElementNS(ns, 'circle');
    c1.setAttribute('cx', 0); c1.setAttribute('cy', 0);
    c1.setAttribute('r', size * 0.55); c1.setAttribute('fill', '#f5d76e');
    svg.appendChild(c1);
    const c2 = document.createElementNS(ns, 'circle');
    c2.setAttribute('cx', 0); c2.setAttribute('cy', 0);
    c2.setAttribute('r', size * 0.28); c2.setAttribute('fill', '#e8c94a');
    svg.appendChild(c2);
    return svg;
  }
  for (let i = 0; i < count; i++) {
    const wrapper = document.createElement('div');
    wrapper.classList.add('daisy');
    const size = 5 + Math.random() * 7;
    const opHigh = (0.25 + Math.random() * 0.35).toFixed(2);
    const opLow  = (parseFloat(opHigh) * 0.3).toFixed(2);
    wrapper.style.cssText = `left:${(Math.random()*100).toFixed(1)}%;top:${(Math.random()*100).toFixed(1)}%;--op-high:${opHigh};--op-low:${opLow};animation-duration:${(3+Math.random()*5).toFixed(1)}s;animation-delay:-${(Math.random()*6).toFixed(1)}s;`;
    const svg = makeDaisy(size);
    svg.style.animationDuration = `${(2+Math.random()*4).toFixed(1)}s`;
    svg.style.animationDelay    = `-${(Math.random()*6).toFixed(1)}s`;
    wrapper.appendChild(svg);
    container.appendChild(wrapper);
  }
})();
</script>

<script>
// secret admin shortcut — Shift + A then D
document.addEventListener('keydown', e => {
  if (e.shiftKey && e.key === 'A') window._a = true;
  if (window._a && e.key === 'D') {
    window._a = false;
    window.location.href = 'admin.html';
  }
});
</script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/service-worker.js');
  }
</script>

</body>
</html>
