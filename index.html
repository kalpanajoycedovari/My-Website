<body>

<header class="top">
  <h1>Solite's Corner</h1>
  <p>"A small corner for you and just you!"</p>

  <!-- PROFILE BOX -->
  <div id="profileBox"></div>

  <!-- ✅ SINGLE CLEAN MENU -->
  <div class="dropdown">
    <button class="dropbtn">☰ Menu</button>

    <div class="dropdown-content">

      <!-- PROFILE -->
      <div class="menu-profile" id="menuProfile">
        <img src="https://via.placeholder.com/40">
        <span>Loading...</span>
      </div>

      <!-- NAV LINKS -->
      <a href="index.html">Home</a>
      <a href="music.html">Music</a>
      <a href="stories.html">Stories</a>
      <a href="cafes.html">Cafés</a>
      <a href="saved.html">Saved ❤️</a>
      <a href="playlist.html">Playlist</a>

      <!-- FEATURES -->
      <button class="menu-btn" onclick="toggleDarkMode()">🌙 Dark Mode</button>
      <button class="menu-btn logout" onclick="logout()">🚪 Logout</button>

    </div>
  </div>

  <!-- SEARCH + RANDOM -->
  <div class="top-bar">
    <input type="text" id="searchInput" placeholder="🔍 search..." />
    <button id="randomBtn">random vibe</button>
  </div>

  <!-- FILTERS -->
  <div class="filters">
    <button data-filter="all">All</button>
    <button data-filter="gloomy">Gloomy</button>
    <button data-filter="soft">Soft</button>
    <button data-filter="nostalgic">Nostalgic</button>
  </div>
</header>

<!-- MAIN -->
<main class="masonry">

  <!-- ✍️ CREATE POST -->
  <div class="create-post">
    <textarea id="postInput" placeholder="yap about your day... 🌙"></textarea>

    <select id="postType">
      <option value="💬 Yap">💬 Yap</option>
      <option value="🎧 Song">🎧 Song</option>
      <option value="📖 Book">📖 Book</option>
      <option value="☕ Café">☕ Café</option>
    </select>

    <input type="text" id="extraInput" placeholder="extra (song link, book name...)">

    <button onclick="createPost()">Post ✨</button>
  </div>

  <!-- POSTS -->
  <div id="postsContainer"></div>

  <!-- ORIGINAL CARDS (UNCHANGED) -->

  <div class="card" data-category="gloomy">
    <img src="images/book.jpg">
    <div class="card-content">
      <h3>📖 Book</h3>
      <p>"for when you want to escape"</p>
      <button class="save-btn"><span class="heart">♡</span></button>
    </div>
  </div>

  <div class="card" data-category="soft">
    <img src="images/cafe.jpg">
    <div class="card-content">
      <h3>☕ Café</h3>
      <p>"Quiet cozy corner"</p>
      <button class="save-btn"><span class="heart">♡</span></button>
    </div>
  </div>

  <div class="card music" data-category="soft">
    <div class="card-content">
      <h3>🎧 Song of the Day</h3>
      <p>"Until I Found You"</p>
      <iframe style="border-radius:12px"
        src="https://open.spotify.com/embed/track/3JvKfv6T31zO0ini8iNItO"
        width="100%" height="80" frameborder="0"
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
      </iframe>
      <button class="save-btn"><span class="heart">♡</span></button>
    </div>
  </div>

  <!-- (rest of your cards unchanged) -->

</main>

<script src="script.js"></script>

</body>
</html>
