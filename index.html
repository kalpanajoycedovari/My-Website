<!DOCTYPE html>
<html>

<head>
  <title>Solite's Corner</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&family=Caveat:wght@400;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#8fbf9f">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="apple-touch-icon" href="images/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

  <script src="firebase-config.js"></script>

  <script>
    firebase.initializeApp(firebaseConfig);
  </script>

</head>

<body>

<div id="daisy-bg"></div>

<header class="top">
  <h1>Solite's Corner</h1>
  <p>"A small corner for you and just you!"</p>
  <div class="top-divider">
  <div class="top-divider-line"></div>
  <div class="top-divider-dot"></div>
  <div class="top-divider-dot"></div>
  <div class="top-divider-dot"></div>
  <div class="top-divider-line"></div>
</div>

  <div id="profileBox"></div>

  <div class="dropdown">
    <button class="dropbtn">☰ Menu</button>
    <div class="dropdown-content">
      <div class="menu-profile" id="menuProfile">
        <img src="https://via.placeholder.com/40">
        <span>Loading...</span>
      </div>
      <a href="index.html">Home</a>
      <a href="music.html">Music</a>
      <a href="stories.html">Stories</a>
      <a href="cafes.html">Cafés</a>
      <a href="saved.html">Saved ❤️</a>
      <a href="playlist.html">Playlist</a>
      <a href="notifications.html">🔔 Notifications</a>
      <button onclick="toggleDarkMode()">🌙 Dark Mode</button>
      <button onclick="logout()">🚪 Logout</button>
    </div>
  </div>

  <div class="top-bar">
    <input type="text" id="searchInput" placeholder="🔍 search..." />
    <button id="randomBtn">random vibe</button>
  </div>

  <div class="filters">
    <button data-filter="all">All</button>
    <button data-filter="gloomy">Gloomy</button>
    <button data-filter="soft">Soft</button>
    <button data-filter="nostalgic">Nostalgic</button>
  </div>

</header>

<main class="masonry">

  <div class="create-post">
    <textarea id="postInput" placeholder="yap about your day... 🌙"></textarea>
    <select id="postType">
      <option value="💬 Yap">💬 Yap</option>
      <option value="🎧 Song">🎧 Song</option>
      <option value="📖 Book">📖 Book</option>
      <option value="☕ Café">☕ Café</option>
    </select>
    <input type="text" id="extraInput" placeholder="extra (song, book, etc)">
    <input type="text" id="lyricsInput" placeholder="write lyrics or how this song makes you feel...">
    <input type="file" id="imageInput">
    <button onclick="createPost()">Post ✨</button>
  </div>

  <div id="postsContainer"></div>

  <div class="card" data-category="gloomy">
    <img src="images/book.jpg">
    <div class="card-content">
      <h3>📖 Book</h3>
      <p>"for when you want to escape"</p>
      <button class="save-btn"><span class="heart">♡</span></button>
    </div>
  </div>

  <div class="card" data-category="soft">
    <img src="images/cafe.jpg">
    <div class="card-content">
      <h3>☕ Café</h3>
      <p>"Quiet cozy corner"</p>
      <button class="save-btn"><span class="heart">♡</span></button>
    </div>
  </div>

  <div class="card music" data-category="soft">
    <div class="card-content">
      <h3>🎧 Song of the Day</h3>
      <p>"Until I Found You"</p>
      <iframe style="border-radius:12px"
        src="https://open.spotify.com/embed/track/3JvKfv6T31zO0ini8iNItO"
        width="100%" height="80"></iframe>
    </div>
  </div>

  <div class="card journal" data-category="nostalgic">
    <div class="card-content">
      <h3>📝 Journal</h3>
      <p>"today felt soft and slow..."</p>
    </div>
  </div>

</main>

<div id="musicPlayer">
  <img id="playerImg" src="">
  <div>
    <p id="playerTitle">No song playing</p>
  </div>
</div>

<script src="script.js"></script>

<script>
(function() {
  const container = document.getElementById('daisy-bg');
  const count = 36;

  function makeDaisy(size) {
    const ns = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(ns, 'svg');
    svg.setAttribute('width', size * 2.6);
    svg.setAttribute('height', size * 2.6);
    svg.setAttribute('viewBox', '-20 -20 40 40');

    const angles = [0, 45, 90, 135, 180, 225, 270, 315];
    angles.forEach(a => {
      const el = document.createElementNS(ns, 'ellipse');
      el.setAttribute('cx', 0);
      el.setAttribute('cy', -size);
      el.setAttribute('rx', size * 0.44);
      el.setAttribute('ry', size * 0.77);
      el.setAttribute('fill', '#fffef0');
      el.setAttribute('transform', `rotate(${a})`);
      svg.appendChild(el);
    });

    const c1 = document.createElementNS(ns, 'circle');
    c1.setAttribute('cx', 0); c1.setAttribute('cy', 0);
    c1.setAttribute('r', size * 0.55);
    c1.setAttribute('fill', '#f5d76e');
    svg.appendChild(c1);

    const c2 = document.createElementNS(ns, 'circle');
    c2.setAttribute('cx', 0); c2.setAttribute('cy', 0);
    c2.setAttribute('r', size * 0.28);
    c2.setAttribute('fill', '#e8c94a');
    svg.appendChild(c2);

    return svg;
  }

  for (let i = 0; i < count; i++) {
    const wrapper = document.createElement('div');
    wrapper.classList.add('daisy');

    const size     = 5 + Math.random() * 7;
    const opHigh   = (0.25 + Math.random() * 0.35).toFixed(2);
    const opLow    = (parseFloat(opHigh) * 0.3).toFixed(2);
    const dur      = (3 + Math.random() * 5).toFixed(1);
    const blinkDur = (2 + Math.random() * 4).toFixed(1);
    const delay    = (Math.random() * 6).toFixed(1);
    const left     = (Math.random() * 100).toFixed(1);
    const top      = (Math.random() * 100).toFixed(1);

    wrapper.style.cssText = `
      left: ${left}%;
      top: ${top}%;
      --op-high: ${opHigh};
      --op-low: ${opLow};
      animation-duration: ${dur}s;
      animation-delay: -${delay}s;
    `;

    const svg = makeDaisy(size);
    svg.style.animationDuration = `${blinkDur}s`;
    svg.style.animationDelay    = `-${delay}s`;

    wrapper.appendChild(svg);
    container.appendChild(wrapper);
  }
})();
</script>

</body>
</html>
