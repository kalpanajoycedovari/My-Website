<!DOCTYPE html>
<html>
<head>
  <title>Crisolite's Corner</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins&family=Playfair+Display&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

  <header class="top">
    <h1>Solite's Corner</h1>
    <p>"A small corner for you and just you!"</p>

    <nav>
      <a href="index.html">Home</a>
      <a href="music.html">Music</a>
      <a href="stories.html">Stories</a>
      <a href="cafes.html">Cafés</a>
    </nav>

    <div class="top-bar">
      <input type="text" placeholder="🔍 search..." />
      <button id="randomBtn">random vibe</button>
    </div>

    <div class="filters">
      <button>Gloomy day</button>
      <button>Soft morning</button>
      <button>Nostalgic</button>
      <button>City lights</button>
      <button>Comfort feels</button>
    </div>
  </header>

  <main class="masonry">

    <!-- CARD 1 -->
    <div class="card">
      <img src="images/book.jpg" alt="book">
      <div class="card-content">
        <h3>📖 Book</h3>
        <p>"for when you want to escape"</p>
        <button>♡ save</button>
      </div>
    </div>

    <!-- CARD 2 -->
    <div class="card">
      <img src="images/cafe.jpg" alt="cafe">
      <div class="card-content">
        <h3>☕ Café</h3>
        <p>"Quiet cozy corner"</p>
        <button>♡ save</button>
      </div>
    </div>

  </main>

  <script src="script.js"></script>

</body>
</html>
