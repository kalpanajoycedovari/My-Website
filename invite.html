<!DOCTYPE html>
<html>
<head>
  <title>Solite's Corner — You're Invited</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&family=Caveat:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="firebase-config.js"></script>
  <script>firebase.initializeApp(firebaseConfig);</script>
</head>

<body>
<div id="daisy-bg"></div>

<header class="top">
  <h1>🌼 You're Invited</h1>
  <p>"a quiet corner of the internet"</p>
</header>

<main style="max-width:500px;margin:0 auto;padding:2rem 1.5rem;position:relative;z-index:1;text-align:center;">
  <div style="background:rgba(255,255,255,0.88);border-radius:24px;padding:32px 28px;border:1px solid rgba(210,175,140,0.3);box-shadow:0 8px 32px rgba(120,70,30,0.1);">
    <div style="font-size:2.5rem;margin-bottom:12px;">🌸</div>
    <div style="font-family:'Playfair Display',serif;font-style:italic;font-size:1.5rem;color:#5c3317;margin-bottom:8px;">someone saved you a seat</div>
    <div style="font-family:'Caveat',cursive;font-size:1rem;color:#b07858;margin-bottom:24px;line-height:1.6;">Solite's Corner is a small, quiet place on the internet — no ads, no algorithm, just people who get the vibe. You were invited here. That means something. ✦</div>
    <a href="login.html" style="display:inline-block;padding:13px 32px;background:linear-gradient(135deg,#c8855c,#a05530);color:#fdf5ec;border-radius:24px;font-family:'DM Sans',sans-serif;font-size:0.95rem;text-decoration:none;">come inside 🌼</a>
  </div>
</main>

<script>
// store the ref uid so login.html can track who invited who
const params = new URLSearchParams(window.location.search);
const ref = params.get('ref');
if (ref) localStorage.setItem('inviteRef', ref);
</script>

<script>
(function() {
  const container = document.getElementById('daisy-bg');
  if (!container) return;
  function makeDaisy(size) {
    const ns = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(ns, 'svg');
    svg.setAttribute('width', size * 2.6);
    svg.setAttribute('height', size * 2.6);
    svg.setAttribute('viewBox', '-20 -20 40 40');
    [0,45,90,135,180,225,270,315].forEach(a => {
      const el = document.createElementNS(ns, 'ellipse');
      el.setAttribute('cx', 0); el.setAttribute('cy', -size);
      el.setAttribute('rx', size * 0.44); el.setAttribute('ry', size * 0.77);
      el.setAttribute('fill', '#fffef0');
      el.setAttribute('transform', `rotate(${a})`);
      svg.appendChild(el);
    });
    const c1 = document.createElementNS(ns, 'circle');
    c1.setAttribute('r', size * 0.55); c1.setAttribute('fill', '#f5d76e');
    svg.appendChild(c1);
    const c2 = document.createElementNS(ns, 'circle');
    c2.setAttribute('r', size * 0.28); c2.setAttribute('fill', '#e8c94a');
    svg.appendChild(c2);
    return svg;
  }
  for (let i = 0; i < 24; i++) {
    const w = document.createElement('div');
    w.classList.add('daisy');
    const size = 5 + Math.random() * 7;
    const opHigh = (0.25 + Math.random() * 0.35).toFixed(2);
    const opLow  = (parseFloat(opHigh) * 0.3).toFixed(2);
    w.style.cssText = `left:${(Math.random()*100).toFixed(1)}%;top:${(Math.random()*100).toFixed(1)}%;--op-high:${opHigh};--op-low:${opLow};animation-duration:${(3+Math.random()*5).toFixed(1)}s;animation-delay:-${(Math.random()*6).toFixed(1)}s;`;
    w.appendChild(makeDaisy(size));
    container.appendChild(w);
  }
})();
</script>

</body>
</html>
