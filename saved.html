<!DOCTYPE html>
<html>
<head>
  <title>Saved</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1 style="text-align:center;">❤️ Your Saved Cards</h1>
<div id="savedContainer" class="masonry"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDc8vbutr2Sfnb49D58LYDdcxAqdY3sNWo",
  authDomain: "solite-d9bdb.firebaseapp.com",
  projectId: "solite-d9bdb"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

firebase.auth().onAuthStateChanged(user => {

  const container = document.getElementById("savedContainer");

  db.collection("users")
    .doc(user.uid)
    .collection("saved")
    .get()
    .then(snapshot => {

      snapshot.forEach(doc => {
        const data = doc.data();

        container.innerHTML += `
          <div class="card">
            ${data.image ? `<img src="${data.image}">` : ""}
            <div class="card-content">
              <h3>${data.title}</h3>
              <p>${data.text}</p>
              <button onclick="deleteCard('${doc.id}')">🗑 remove</button>
            </div>
          </div>
        `;
      });

    });

});

function deleteCard(id) {
  const user = firebase.auth().currentUser;

  db.collection("users")
    .doc(user.uid)
    .collection("saved")
    .doc(id)
    .delete()
    .then(() => location.reload());
}
</script>

</body>
</html>
